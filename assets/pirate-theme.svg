<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 5000 5000" role="img" aria-label="Pirate skull and crossed swords">
  <defs>
    <filter id="invert" color-interpolation-filters="sRGB">
      <feComponentTransfer>
        <feFuncR type="table" tableValues="1 0"/>
        <feFuncG type="table" tableValues="1 0"/>
        <feFuncB type="table" tableValues="1 0"/>
      </feComponentTransfer>
    </filter>
    <mask id="ink-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="5000" height="5000" mask-type="luminance">
      <image href="2011.jpg" x="0" y="0" width="5000" height="5000" preserveAspectRatio="xMidYMid meet" filter="url(#invert)"/>
    </mask>
  </defs>
  <rect width="5000" height="5000" fill="#dab360" opacity="0.78" mask="url(#ink-mask)"/>
</svg>
